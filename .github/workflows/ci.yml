name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI smoke test
        run: |
          review-benchmark-harness score --suite examples/sample-suite --predictions examples/sample-suite/predictions/good --system-name ci-bot --output work/ci/score.json --markdown-output work/ci/score.md --csv-output work/ci/cases.csv --junit-output work/ci/junit.xml
          review-benchmark-harness check work/ci/score.json --min-f1 0.80 --min-recall 0.80 --check error
